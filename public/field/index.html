<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Sitely Field — Ridgeline Construction</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sitely Field">
<meta name="theme-color" content="#15171a">
<link rel="icon" type="image/png" href="../sitely-192.png">
<link rel="apple-touch-icon" href="../apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&amp;family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<style>
:root{
  --accent:#7aa7de; --accent-soft:rgba(122,167,222,0.16); --accent-on-fill:#12241f;
  --bg-body:#0e0f11; --bg-app:#15171a; --bg-header:#131518; --bg-tabbar:#121417; --bg-card:#1a1d20;
  --bg-input:#202327; --bg-input-done:#1c1f22;
  --tx:#edecea; --serif-bright:#efe9da; --serif-warm1:#e6dfce; --serif-warm2:#d7cfba;
  --muted1:#8b9095; --muted2:#9aa0a6; --faint1:#6c7278; --faint2:#6b7176; --faint3:#5c6166;
  --hair-row:rgba(255,255,255,0.06); --hair-sec:rgba(255,255,255,0.13); --ctrl-bd:rgba(255,255,255,0.14);
  --good:#79c07a; --amber:#d9b46a; --bad:#c98b6b;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;background:var(--bg-body);}
body{font-family:'Hanken Grotesk',sans-serif;}
button,input,textarea,select{font-family:inherit;}
input:focus,textarea:focus,select:focus{outline:2px solid var(--accent);outline-offset:1px;}
::-webkit-scrollbar{display:none;}
h1,h2,h3{font-family:'Source Serif 4',serif;margin:0;}
a{color:inherit;}
.hidden{display:none !important;}

#frame{max-width:440px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;background:var(--bg-app);color:var(--tx);position:relative;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,0.5);}

#main{flex:1;display:flex;flex-direction:column;min-height:0;position:relative;}

/* ---------- header ---------- */
#topbar{flex:0 0 auto;background:var(--bg-header);border-bottom:1px solid rgba(255,255,255,0.07);padding:calc(15px + env(safe-area-inset-top,0px)) 18px 13px 18px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
#job-switch{background:none;border:none;padding:0;text-align:left;cursor:pointer;min-width:0;}
#job-switch .eyebrow{font-size:10px;font-weight:600;letter-spacing:1.7px;text-transform:uppercase;color:var(--accent);}
#job-switch .name-row{display:flex;align-items:center;gap:6px;margin-top:2px;}
#job-switch .name-row span.name{font-family:'Source Serif 4',serif;font-size:20px;font-weight:600;color:var(--serif-warm1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:210px;}
#job-switch .chev{width:15px;height:15px;flex:0 0 auto;}
#topbar .right{display:flex;align-items:center;gap:10px;flex:0 0 auto;padding-top:2px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--good);box-shadow:0 0 0 3px rgba(121,192,122,0.16);flex:0 0 auto;}
#avatar{width:34px;height:34px;border-radius:50%;background:#242830;border:1px solid rgba(255,255,255,0.12);color:#cbd0d5;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;cursor:pointer;}

/* ---------- content ---------- */
#content{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:22px 18px calc(100px + env(safe-area-inset-bottom,0px)) 18px;}
.screen-title{font-family:'Source Serif 4',serif;font-size:32px;font-weight:600;letter-spacing:-0.3px;color:var(--serif-bright);line-height:1;}
.screen-sub{font-size:13.5px;color:var(--muted1);margin-top:6px;}
.status-row{display:flex;align-items:center;gap:10px;margin-top:14px;flex-wrap:wrap;}
.status-row .synced{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--good);display:flex;align-items:center;gap:5px;}
.status-row .date{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted1);}

/* ---------- bottom tabs ---------- */
#tabs{flex:0 0 auto;position:absolute;left:0;right:0;bottom:0;display:flex;background:var(--bg-tabbar);border-top:1px solid rgba(255,255,255,0.08);padding:8px 4px calc(8px + env(safe-area-inset-bottom,0px)) 4px;}
#tabs button{flex:1;background:transparent;border:none;padding:6px 2px;font-size:11px;font-weight:600;color:var(--muted2);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;}
#tabs button svg{width:22px;height:22px;stroke:var(--muted2);}
#tabs button.active{color:var(--accent);}
#tabs button.active svg{stroke:var(--accent);}

/* ---------- generic ---------- */
.card{background:var(--bg-card);border:1px solid rgba(255,255,255,0.09);border-radius:14px;padding:16px;margin-bottom:12px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:44px;padding:0 16px;font-size:14.5px;font-weight:700;border-radius:9px;border:1px solid rgba(255,255,255,0.16);background:transparent;color:#cbd0d5;cursor:pointer;}
.btn-fill{background:var(--accent);color:var(--accent-on-fill);border-color:var(--accent);}
.btn-block{width:100%;}
.btn-sm{min-height:36px;padding:0 12px;font-size:13px;border-radius:7px;}
.btn-dashed{border:1px dashed rgba(255,255,255,0.22);color:var(--muted2);background:transparent;}
input[type=text],input[type=number],input[type=password],textarea,select{
  width:100%;border:1px solid rgba(255,255,255,0.14);background:var(--bg-input);color:var(--tx);padding:11px 13px;font-size:16px;border-radius:9px;
}
textarea{resize:vertical;}
input[type=date]{font-family:'Hanken Grotesk',sans-serif;font-size:12.5px;font-weight:500;color:#c7ccd1;background:var(--bg-input);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:7px 8px;color-scheme:dark;}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.55);}
.row{display:flex;gap:10px;align-items:center;}
.row.wrap{flex-wrap:wrap;}
.spacer{flex:1;}
.muted{color:var(--muted1);}
.chip{display:inline-flex;align-items:center;font-size:12.5px;font-weight:600;padding:7px 15px;border-radius:999px;border:1px solid rgba(255,255,255,0.14);color:#9aa0a6;background:transparent;cursor:pointer;}
.chip.active{color:var(--accent);border-color:var(--accent);background:var(--accent-soft);}
.check{width:26px;height:26px;flex:0 0 26px;border-radius:7px;border:1.6px solid rgba(255,255,255,0.26);background:transparent;cursor:pointer;appearance:none;-webkit-appearance:none;position:relative;transition:all .15s;}
.check:checked{border-color:var(--accent);background:var(--accent);}
.check:checked::after{content:'';position:absolute;left:6px;top:2px;width:6px;height:11px;border:solid #14231f;border-width:0 2px 2px 0;transform:rotate(45deg);}
.pill{display:inline-block;font-size:11.5px;font-weight:700;letter-spacing:0.04em;padding:3px 9px;border-radius:20px;border:1px solid rgba(255,255,255,0.16);color:var(--muted2);}
.pill-pending{color:var(--amber);border-color:var(--amber);}
.pill-approved{color:var(--good);border-color:var(--good);}
.pill-rejected{color:var(--bad);border-color:var(--bad);}
.list-empty{padding:40px 16px;text-align:center;color:var(--muted1);font-size:14.5px;}

/* ---------- login ---------- */
#login-screen{position:fixed;inset:0;background:var(--bg-body);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;}
#login-screen .box{max-width:320px;width:100%;text-align:center;}
#login-screen .mark{width:60px;height:60px;border-radius:15px;background:linear-gradient(155deg,#4C7BF6,#1E44BE);display:flex;align-items:center;justify-content:center;margin:0 auto 16px auto;}
#login-screen .mark span{color:#fff;font-weight:700;font-size:28px;font-family:'Hanken Grotesk',sans-serif;}
#login-screen h1{font-size:24px;color:var(--serif-bright);margin-bottom:2px;}
#login-screen .tag{font-size:11px;font-weight:700;letter-spacing:0.16em;color:var(--muted1);margin-bottom:26px;text-transform:uppercase;}
#login-screen input{margin-bottom:12px;}
#login-err{color:var(--bad);font-size:13px;margin-top:10px;min-height:18px;}

/* ---------- job picker sheet ---------- */
#scrim{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:60;animation:fadeIn .18s;}
#jobsheet{position:fixed;left:0;right:0;bottom:0;z-index:61;max-width:440px;margin:0 auto;background:var(--bg-card);border-top:1px solid rgba(255,255,255,0.1);border-radius:20px 20px 0 0;max-height:80vh;overflow-y:auto;padding:10px 18px calc(24px + env(safe-area-inset-bottom,0px)) 18px;animation:sheetUp .26s cubic-bezier(.2,.8,.2,1);}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes sheetUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.grab{width:40px;height:4px;border-radius:999px;background:rgba(255,255,255,0.18);margin:2px auto 14px auto;}
.sheet-label{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--faint1);margin-bottom:10px;}
.jobrow{padding:13px 2px;border-bottom:1px solid var(--hair-row);cursor:pointer;}
.jobrow .name{font-family:'Source Serif 4',serif;font-size:16.5px;font-weight:600;color:var(--serif-warm1);}
.jobrow .sub{font-size:12px;color:var(--muted1);margin-top:2px;}
.prospects-toggle{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--faint1);padding:12px 2px;cursor:pointer;}

/* ---------- schedule ---------- */
.phase-head{display:flex;align-items:baseline;justify-content:space-between;margin-top:28px;padding-bottom:8px;border-bottom:1px solid var(--hair-sec);}
.phase-head:first-child{margin-top:0;}
.phase-head h3{font-family:'Source Serif 4',serif;font-size:18px;font-weight:700;color:var(--serif-warm2);letter-spacing:.2px;}
.phase-head .count{font-size:11px;font-weight:600;text-transform:uppercase;color:var(--faint1);}
.collapse-toggle{font-size:12.5px;font-weight:600;color:#7d8388;padding:10px 0;cursor:pointer;display:flex;align-items:center;gap:6px;}
.collapse-toggle .caret{display:inline-block;transition:transform .18s;}
.collapse-toggle.open .caret{transform:rotate(90deg);}
.task-row{display:flex;gap:14px;padding:13px 0;border-bottom:1px solid var(--hair-row);align-items:flex-start;}
.task-row .body{flex:1;min-width:0;}
.task-name{font-size:15.5px;font-weight:500;color:var(--tx);}
.task-name.done{color:var(--faint1);text-decoration:line-through;}
.task-date-pill{flex:0 0 auto;font-size:12.5px;font-weight:500;color:#c7ccd1;background:var(--bg-input);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:7px 10px;white-space:nowrap;}
.task-date-pill.done{background:var(--bg-input-done);color:var(--faint2);}
.task-date-inp.done{background:var(--bg-input-done);color:var(--faint2);border-color:rgba(255,255,255,0.07);}
.note-toggle{background:none;border:none;cursor:pointer;font-size:17px;padding:2px 4px;flex:0 0 auto;}
.task-note{font-size:12px;line-height:1.4;color:var(--faint2);margin-top:6px;white-space:pre-wrap;}
.task-note-box{width:100%;margin-top:8px;min-height:56px;font-size:15px;}

/* ---------- estimate ---------- */
.total-card{background:var(--bg-card);border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:20px;margin-top:16px;}
.total-card .lbl{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted1);}
.total-card .num{margin-top:8px;font-family:'Source Serif 4',serif;font-size:38px;font-weight:600;color:var(--serif-bright);letter-spacing:-0.5px;}
.total-card .note{margin-top:6px;font-size:12.5px;color:var(--good);}
.cat-head{display:flex;align-items:baseline;justify-content:space-between;margin-top:22px;padding-bottom:7px;border-bottom:1px solid var(--hair-sec);}
.cat-head h3{font-family:'Source Serif 4',serif;font-size:17px;font-weight:700;color:var(--serif-warm2);}
.cat-head .amt{font-size:14px;font-weight:600;color:var(--serif-warm1);}
.est-row{display:flex;justify-content:space-between;align-items:baseline;padding:12px 0;border-bottom:1px solid var(--hair-row);cursor:pointer;gap:10px;}
.est-row .nm{font-size:14.5px;color:#c7ccd1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.est-row .amt{font-size:14px;font-weight:500;color:var(--muted2);font-variant-numeric:tabular-nums;white-space:nowrap;}
.est-detail{background:rgba(255,255,255,0.02);border-radius:10px;padding:14px;margin:-4px 0 10px 0;}
.cl-line{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;color:var(--muted2);border-bottom:1px dotted var(--hair-row);}
.cl-line .d{color:#b9bec3;}
.notes-log{margin-top:12px;}
.notes-log .n{padding:9px 0;border-top:1px dotted var(--hair-row);}
.notes-log .n .txt{font-size:13.5px;color:#dcd9d0;}
.notes-log .n .meta{font-size:11px;color:var(--faint1);margin-top:3px;display:flex;gap:8px;align-items:center;}

/* ---------- board ---------- */
.note-card{background:var(--bg-card);border:1px solid rgba(255,255,255,0.09);border-radius:14px;padding:16px;margin-bottom:12px;}
.note-card .txt{font-size:15px;color:#dcd9d0;white-space:pre-wrap;}
.note-card .meta{font-size:11.5px;color:var(--faint1);margin-top:10px;}
.checklist-item{display:flex;align-items:center;gap:10px;padding:6px 0;}
.checklist-item .txt{flex:1;font-size:14.5px;color:#c7ccd1;}
.checklist-item .txt.done{text-decoration:line-through;color:var(--faint1);}
</style>
</head>
<body>
<div id="frame">

  <div id="login-screen">
    <div class="box">
      <div class="mark"><span>s</span></div>
      <h1>Sitely Field</h1>
      <div class="tag">Every site, sorted.</div>
      <input type="password" id="login-pw" placeholder="Password" autocomplete="current-password">
      <button class="btn btn-fill btn-block" id="login-btn">Sign in</button>
      <div id="login-err"></div>
    </div>
  </div>

  <div id="main" class="hidden">
    <div id="topbar">
      <button id="job-switch">
        <div class="eyebrow">Current job</div>
        <div class="name-row">
          <span class="name" id="job-name">Select a job</span>
          <svg class="chev" viewBox="0 0 20 20" fill="none"><path d="M5 7l5 5 5-5" stroke="#8b9095" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </button>
      <div class="right">
        <span class="sync-dot" id="sync-dot" title=""></span>
        <div id="avatar" title="Sign out">RC</div>
      </div>
    </div>

    <div id="content"></div>

    <div id="tabs">
      <button data-tab="schedule" class="active">
        <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="16" rx="2" stroke-width="1.6"/><path d="M3 9h18M8 3v4M16 3v4" stroke-width="1.6" stroke-linecap="round"/></svg>
        Schedule
      </button>
      <button data-tab="estimate">
        <svg viewBox="0 0 24 24" fill="none"><rect x="5" y="3" width="14" height="18" rx="2" stroke-width="1.6"/><path d="M8 8h8M8 12h8M8 16h5" stroke-width="1.6" stroke-linecap="round"/></svg>
        Estimate
      </button>
      <button data-tab="board">
        <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="8" rx="1.5" stroke-width="1.6"/><rect x="13" y="3" width="8" height="8" rx="1.5" stroke-width="1.6"/><rect x="3" y="13" width="8" height="8" rx="1.5" stroke-width="1.6"/><rect x="13" y="13" width="8" height="8" rx="1.5" stroke-width="1.6"/></svg>
        Board
      </button>
    </div>
  </div>

</div>

<script src="../sync.js"></script>
<script src="../schedule-share.js"></script>
<script src="app.js"></script>
</body>
</html>
