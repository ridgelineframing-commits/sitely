<svg viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg" font-family="'DM Sans','Poppins','Helvetica Neue',Arial,sans-serif">
  <defs>
    <!-- Paper: blueprint blue at the bottom, gradient up to white -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F6F9FC"/>
      <stop offset="0.30" stop-color="#0F3468"/>
      <stop offset="1" stop-color="#0F3468"/>
    </linearGradient>

    <!-- Grid: white lines. On white they vanish, on blue they show — so they fade with the paper -->
    <pattern id="grid" width="90" height="90" patternUnits="userSpaceOnUse">
      <path d="M18 0V90 M36 0V90 M54 0V90 M72 0V90 M0 18H90 M0 36H90 M0 54H90 M0 72H90"
            stroke="#FFFFFF" stroke-opacity="0.13" stroke-width="1.2" fill="none"/>
      <path d="M0 0H90 M0 0V90" stroke="#FFFFFF" stroke-opacity="0.28" stroke-width="1.6" fill="none"/>
    </pattern>

    <clipPath id="iconClip"><rect x="100" y="100" width="700" height="700" rx="154"/></clipPath>

    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0F3468" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="900" height="900" fill="#EAEEF3"/>

  <!-- Icon paper -->
  <rect x="100" y="100" width="700" height="700" rx="154" fill="url(#bg)" filter="url(#sh)"/>

  <!-- Grid, clipped to the icon and co-fading with the paper -->
  <g clip-path="url(#iconClip)">
    <rect x="100" y="100" width="700" height="700" fill="url(#grid)"/>
  </g>

  <!-- Hairline to define the white top edge against the backing -->
  <rect x="100" y="100" width="700" height="700" rx="154" fill="none" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- Wordmark -->
  <text x="450" y="480" text-anchor="middle" fill="#FFFFFF" font-size="190" font-weight="700" letter-spacing="-4">sitely</text>
  <text x="450" y="560" text-anchor="middle" fill="#AECBEE" font-size="26" font-weight="700" letter-spacing="1">Every site, sorted.</text>
</svg>
